apiVersion: v1
kind: Service
metadata:
  name: redis
  annotations:
    backstage.io/kubernetes-id: {{ .Values.backstage.annotation }}
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}
      protocol: TCP
      name: redis
  selector:
    app: redis
    backstage.io/kubernetes-id: {{ .Values.backstage.label }}    

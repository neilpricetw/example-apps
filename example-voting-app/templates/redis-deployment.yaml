apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  annotations:
    backstage.io/kubernetes-id: {{ .Values.backstage.annotation }}
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        backstage.io/kubernetes-id: {{ .Values.backstage.label }}      
    spec:
      containers:
      - name: redis
        image: "{{ .Values.redis.repository }}:{{ .Values.redis.tag }}"
        ports:
        - containerPort: {{ .Values.redis.port }}